<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/images/Logos/ISOTIPO_SAHM.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3D2785" />

    <!-- SEO primary -->
    <title>SAHM | Llantas, cámaras y repuestos para moto</title>
    <meta name="description" content="Encuentra llantas, cámaras y repuestos para moto. Cotiza por WhatsApp, valida compatibilidad y recibe atención personalizada con despacho a nivel nacional." />
    <meta name="keywords" content="llantas moto Peru, repuestos moto Lima, camaras moto, llantas Honda Wave, repuestos Bajaj, llantas Yamaha, repuestos moto WhatsApp, SAHM" />
    <link rel="canonical" href="https://sahm.pe/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sahm.pe/" />
    <meta property="og:title" content="SAHM — Llantas y Repuestos para Moto en Perú" />
    <meta property="og:description" content="Llantas, cámaras y repuestos con stock real, asesoría experta y despacho nacional. Cotiza por WhatsApp en minutos." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1487754180451-c456f719a1fc?auto=format&fit=crop&w=1200&q=80" />
    <meta property="og:locale" content="es_PE" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SAHM — Llantas y Repuestos para Moto en Perú" />
    <meta name="twitter:description" content="Llantas, cámaras y repuestos con stock real, asesoría experta y despacho nacional." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1487754180451-c456f719a1fc?auto=format&fit=crop&w=1200&q=80" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured data: LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Store",
      "name": "SAHM",
      "description": "Distribución de llantas, cámaras y repuestos de moto. Atendemos Lima y todo el Perú con compatibilidad validada y despacho nacional.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "PE",
        "addressRegion": "Lima"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "sales",
        "availableLanguage": ["Spanish", "English"]
      },
      "openingHours": "Mo-Sa 09:00-18:00",
      "areaServed": {
        "@type": "Country",
        "name": "Peru"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Llantas, cámaras y repuestos de moto"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
